<!DOCTYPE html>
<html lang="sk">
<head>
    <link rel="stylesheet" href="/style.css">
    <meta charset="UTF-8">
    <title>VES Generátor</title>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    
    <!-- Skrytý YouTube prehrávač pre Skyrim hudbu -->
    <div id="youtube-player" style="position: absolute; width: 1px; height: 1px; top: -9999px; left: -9999px;"></div>

    <div class="container">
        <h1>Generátor obrázkov (ves.py)</h1>
        
        <div>
            <label for="vesInput">Zadajte kód VES:</label><br>
            <textarea id="vesInput" placeholder="VES 1.0 200 200&#10;CLEAR #FFFFFF&#10;CIRCLE 100 100 50 2 #000000"></textarea>
            <br>
            <div style="display: flex; gap: 15px;">
                <button id="generateBtn">Vytvoriť obrázok</button>
                <button id="randomVesBtn">Náhodný VES s tvarmi</button>
            </div>
        </div>

        <div style="margin-top: 20px;">
            <p id="status"></p>
            <div id="imageContainer"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
